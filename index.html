<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EC2 — Dimensionamento de Secções</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f4f5f7;
  color: #1a1e2e;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 14px;
  min-height: 100vh;
}
input, select, button { font-family: Georgia, 'Times New Roman', serif; font-size: 14px; }

.page { max-width: 980px; margin: 0 auto; padding: 28px 16px 48px; }

.header { border-bottom: 2px solid #1a1e2e; padding-bottom: 12px; margin-bottom: 24px; }
.header-top { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
.header-code { font-size: 11px; font-family: monospace; color: #555; letter-spacing: 0.08em; border: 1px solid #ccc; padding: 2px 8px; border-radius: 3px; }
h1 { font-size: 20px; font-weight: normal; color: #1a1e2e; }
.header-sub { font-size: 12px; color: #666; margin-top: 4px; font-family: Arial, sans-serif; }

.mode-row { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid #1a1e2e; border-radius: 4px; overflow: hidden; width: fit-content; }
.mode-btn { padding: 8px 24px; background: #fff; color: #1a1e2e; border: none; cursor: pointer; font-size: 13px; transition: background 0.1s; border-right: 1px solid #1a1e2e; font-family: Arial, sans-serif; }
.mode-btn:last-child { border-right: none; }
.mode-btn.active { background: #1a1e2e; color: #fff; }

.layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
@media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }

.panel { background: #fff; border: 1px solid #d0d4dc; border-radius: 6px; padding: 18px; margin-bottom: 16px; }
.panel-title {
  font-size: 11px; font-family: Arial, sans-serif; font-weight: bold;
  text-transform: uppercase; letter-spacing: 0.12em; color: #555;
  margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px solid #e8eaed;
}

.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 12px; color: #444; margin-bottom: 4px; font-family: Arial, sans-serif; }
.field input, .field select {
  width: 100%; border: 1px solid #bbbec6; border-radius: 4px;
  padding: 7px 10px; color: #1a1e2e; background: #fff;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.field input::-webkit-outer-spin-button,
.field input::-webkit-inner-spin-button { -webkit-appearance: none; }
.field input:focus, .field select:focus { outline: none; border-color: #2c5282; box-shadow: 0 0 0 2px rgba(44,82,130,0.12); }
.field-note { font-size: 11px; color: #888; margin-top: 4px; font-family: Arial, sans-serif; }

.mat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.mat-chip { background: #f4f5f7; border: 1px solid #e0e2e8; border-radius: 4px; padding: 8px 10px; }
.mat-chip-lbl { font-size: 11px; font-family: Arial, sans-serif; color: #666; }
.mat-chip-val { font-size: 15px; font-family: monospace; color: #1a1e2e; margin-top: 2px; }
.mat-chip-unit { font-size: 11px; color: #888; }

.sec-props { background: #f8f9fb; border: 1px solid #e0e2e8; border-radius: 4px; padding: 10px 12px; margin-top: 10px; }
.sec-props-title { font-size: 11px; font-family: Arial,sans-serif; color: #555; font-weight: bold; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.sec-props table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: Arial, sans-serif; }
.sec-props td { padding-bottom: 4px; color: #555; }
.sec-props td:last-child { text-align: right; font-family: monospace; color: #1a1e2e; }
.sec-props td.hl { color: #2c5282; font-weight: bold; }

.diagram-panel { background: #fff; border: 1px solid #d0d4dc; border-radius: 6px; padding: 18px; margin-bottom: 16px; }
.diagram-caption { font-size: 11px; font-family: Arial,sans-serif; color: #999; text-align: center; margin-top: 8px; }

.results-panel { background: #fff; border: 1px solid #d0d4dc; border-radius: 6px; padding: 18px; }
.section-label {
  font-size: 11px; font-family: Arial, sans-serif; font-weight: bold;
  text-transform: uppercase; letter-spacing: 0.1em; color: #777;
  margin: 14px 0 6px; border-top: 1px solid #eee; padding-top: 10px;
}
.section-label:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }

.result-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
.result-row.hl { background: #ebf4ff; margin: 0 -18px; padding: 8px 18px; border-bottom: 1px solid #c9dff5; }
.result-row.ok-row  { background: #f0fff4; margin: 0 -18px; padding: 8px 18px; border-bottom: 1px solid #9ae6b4; }
.result-row.err-row { background: #fff5f5; margin: 0 -18px; padding: 8px 18px; border-bottom: 1px solid #feb2b2; }
.result-row:last-child { border-bottom: none; }
.result-name { font-size: 13px; color: #333; font-family: Arial, sans-serif; }
.result-sub  { font-size: 11px; color: #999; font-family: Arial, sans-serif; margin-top: 1px; }
.result-val  { font-family: monospace; font-size: 14px; color: #1a1e2e; white-space: nowrap; min-width: 90px; text-align: right; }
.result-val.hl  { font-size: 16px; font-weight: bold; color: #2c5282; }
.result-val.ok  { font-size: 15px; font-weight: bold; color: #276749; }
.result-val.err { font-size: 15px; font-weight: bold; color: #c53030; }
.result-unit { font-size: 11px; color: #888; margin-left: 3px; }

.error-box { background: #fff5f5; border: 1px solid #feb2b2; border-radius: 4px; padding: 12px; color: #c53030; font-size: 13px; font-family: Arial, sans-serif; line-height: 1.5; white-space: pre-line; }
.warn-box  { background: #fffaf0; border: 1px solid #f6ad55; border-radius: 4px; padding: 10px 12px; color: #7b341e; font-size: 12px; font-family: Arial, sans-serif; line-height: 1.5; margin-bottom: 12px; }
.ec2-note { font-size: 11px; color: #888; font-family: Arial, sans-serif; line-height: 1.6; margin-top: 14px; padding-top: 10px; border-top: 1px solid #eee; }

.badge { display: inline-block; font-size: 11px; font-family: monospace; padding: 2px 8px; border-radius: 3px; border: 1px solid #bbb; background: #f8f8f8; color: #333; }
.badge.ok   { background: #f0fff4; border-color: #9ae6b4; color: #276749; }
.badge.warn { background: #fffaf0; border-color: #f6ad55; color: #7b341e; }
.badge.err  { background: #fff5f5; border-color: #feb2b2; color: #c53030; }

.sigma-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
.sigma-toggle { display: flex; border: 1px solid #bbbec6; border-radius: 4px; overflow: hidden; }
.sigma-toggle button { padding: 5px 12px; border: none; background: #fff; cursor: pointer; font-size: 12px; font-family: Arial,sans-serif; color: #555; border-right: 1px solid #bbbec6; }
.sigma-toggle button:last-child { border-right: none; }
.sigma-toggle button.active { background: #1a1e2e; color: #fff; }

.page-footer { margin-top: 28px; font-size: 11px; color: #aaa; font-family: Arial, sans-serif; text-align: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

/* ── Materials ─────────────────────────────────────────────────────────── */
const CONCRETE = [
  {l:"C12/15",fck:12},{l:"C16/20",fck:16},{l:"C20/25",fck:20},
  {l:"C25/30",fck:25},{l:"C30/37",fck:30},{l:"C35/45",fck:35},
  {l:"C40/50",fck:40},{l:"C45/55",fck:45},{l:"C50/60",fck:50},
  {l:"C55/67",fck:55},{l:"C60/75",fck:60},
];
const STEEL = [
  {l:"A400 NR  (fyk = 400 MPa)", fyk:400},
  {l:"A500 NR  (fyk = 500 MPa)", fyk:500},
  {l:"A600 NR  (fyk = 600 MPa)", fyk:600},
];

/* ── EC2 helpers ────────────────────────────────────────────────────────── */
function getLambdaEta(fck) {
  return {
    lambda: fck <= 50 ? 0.8 : 0.8 - (fck - 50) / 400,
    eta:    fck <= 50 ? 1.0 : 1.0 - (fck - 50) / 200,
  };
}
function getEcu3(fck) {
  return fck <= 50 ? 0.0035 : 0.0026 + 0.035 * Math.pow((90 - fck) / 100, 4);
}

/* ── Solver: pure bending ───────────────────────────────────────────────── */
function solvePureBending(MEd_kNm, b_m, d_m, fck, fyk) {
  const { lambda, eta } = getLambdaEta(fck);
  const fcd = fck / 1.5, fyd = Math.min(fyk / 1.15, 600);
  const ecu3 = getEcu3(fck), esy = fyd / 200000;
  const b = b_m * 1000, d = d_m * 1000;
  const mu = (MEd_kNm * 1e6) / (b * d * d * fcd);
  const disc = 1 - 2 * mu / eta;
  if (disc < 0 || mu >= 0.5 * eta)
    return { error: `μ = ${mu.toFixed(4)} excede a capacidade máxima da secção simplesmente armada.\nAumente b, d ou utilize armadura de compressão.` };
  const u = 1 - Math.sqrt(disc);
  const xi = u / lambda, zd = 1 - u / 2;
  const omega = eta * u;
  const xiLim = ecu3 / (ecu3 + esy);
  const domain = xi < ecu3 / (ecu3 + 0.01) ? "2" : xi <= xiLim ? "3" : "4";
  const As_cm2 = omega * b * d * (fcd / fyd) / 100;
  return {
    mu, omega, xi, zd,
    xNA_m: xi * d_m,
    z_m: zd * d_m,
    domain, As_cm2: +As_cm2.toFixed(2),
    fcd, fyd, lambda: +lambda.toFixed(3), eta: +eta.toFixed(3), ecu3,
  };
}

/* ── Solver: bending + axial ────────────────────────────────────────────── */
function solveBendingAxial(MEd_kNm, NEd_kN, b_m, h_m, dp_m, fck, fyk) {
  const { lambda, eta } = getLambdaEta(fck);
  const fcd = fck / 1.5, fyd = Math.min(fyk / 1.15, 600);
  const Es = 200000, ecu3 = getEcu3(fck);
  const b = b_m * 1000, h = h_m * 1000, dph = (h_m - dp_m) / h_m;
  const mu = (MEd_kNm * 1e6) / (b * h * h * fcd);
  const nu = (NEd_kN  * 1e3) / (b * h * fcd);
  const strains = xi => ({
    es_c: ecu3 * (xi - dph) / xi,
    es_t: ecu3 * (xi - (1 - dph)) / xi,
  });
  let xi = 0.3, omega = 0.1;
  for (let i = 0; i < 400; i++) {
    xi = Math.max(0.005, Math.min(2.0, xi));
    const { es_c, es_t } = strains(xi);
    const ss_c = Math.max(-fyd, Math.min(fyd, es_c * Es));
    const ss_t = Math.max(-fyd, Math.min(fyd, es_t * Es));
    const fc = eta * lambda * xi;
    const sum_s = ss_c + ss_t;
    let omega_new = Math.abs(sum_s) > 0.5 ? (nu - fc) * 2 * fyd / sum_s : omega;
    omega_new = Math.max(0, omega_new);
    const mu_c = fc * (0.5 - lambda * xi / 2) + (omega_new / 2) * ((ss_c - ss_t) / fyd) * (0.5 - dph);
    const resid = mu_c - mu;
    const step = Math.max(-0.1, Math.min(0.1, -resid / (eta * lambda * (0.5 - lambda * xi) || 0.01)));
    xi += step * 0.6;
    if (Math.abs(resid) < 1e-9 && Math.abs(omega_new - omega) < 1e-9) { omega = omega_new; break; }
    omega = omega_new;
  }
  omega = Math.max(0, omega);
  const { es_c, es_t } = strains(xi);
  const ss_c = Math.max(-fyd, Math.min(fyd, es_c * Es));
  const ss_t = Math.max(-fyd, Math.min(fyd, es_t * Es));
  const As_tot = omega * b * h * (fcd / fyd) / 100;
  const esy = fyd / Es;
  const domain = es_t < -esy ? "2–3" : es_t < 0 ? "3–4" : xi < 1 ? "4" : "5";
  return {
    mu, nu, omega, xi, xNA_m: xi * h_m, domain,
    ss_c: +ss_c.toFixed(1), ss_t: +ss_t.toFixed(1),
    As_tot_cm2: +As_tot.toFixed(2), As_each_cm2: +(As_tot / 2).toFixed(2),
    fcd, fyd, lambda: +lambda.toFixed(3), eta: +eta.toFixed(3), ecu3,
  };
}

/* ── Punching shear solver (EN 1992-1-1 6.4) ───────────────────────────── */
function solvePunching(bx, by, Bx, By, hF, cov, phiMM, rhoL_pct, VEd_kN, MEd_kNm, fck, fyk) {
  if (bx <= 0 || by <= 0 || Bx <= 0 || By <= 0 || hF <= 0) return { error: "Geometria inválida." };
  if (bx >= Bx || by >= By) return { error: "Pilar deve ser menor que a sapata (bx < Bx, by < By)." };
  const phi_m = phiMM / 1000;
  const d = hF - cov - phi_m / 2;
  if (d <= 0.01) return { error: "Altura útil d ≤ 0.01 m.\nVerifique h, recobrimento e diâmetro da armadura." };
  const d_mm = d * 1000;

  /* Overhangs */
  const a0x = (Bx - bx) / 2;  // overhang in x = a_(0,x)
  const a0y = (By - by) / 2;  // overhang in y = a_(0,y)

  /* EC2 basic control perimeter at d — 4 quarter-circles at corners (6.4.2) */
  const u_crit = 2 * (bx + by) + 2 * Math.PI * d;               // m
  const A_crit = bx * by + 2 * (bx + by) * d + Math.PI * d * d; // m²
  const A_foot = Bx * By;                                         // m²

  /* Soil pressures — trapezoidal (eccentric loading) */
  const sigma_avg = VEd_kN / A_foot;                       // = (σ₁+σ₂)/2 always  [kN/m²]
  const sigma_M   = 6 * MEd_kNm / (By * Bx * Bx);         // moment contribution  [kN/m²]
  const sigma1    = sigma_avg + sigma_M;                    // max (right edge)
  const sigma2    = sigma_avg - sigma_M;                    // min (left edge)
  /* σ₃: stress at right face of critical section (x = Bx/2 + bx/2 + d from left edge) */
  const sigma3    = sigma_avg + sigma_M * (bx + 2 * d) / Bx;

  /* Net punching force: use average pressure (= VEd/A_foot) over symmetric critical area */
  const VEd_red = Math.max(0, VEd_kN - sigma_avg * A_crit);  // kN

  /* Punching shear stress (β = 1.0, centric) */
  const vEd = VEd_red / (u_crit * d) * 0.001;  // MPa

  /* EC2 resistance with 2d/a factor (a = d → factor = 2, 6.4.4(2)) */
  const rhoL  = Math.min(rhoL_pct / 100, 0.02);
  const k     = Math.min(1 + Math.sqrt(200 / d_mm), 2.0);
  const CRdc  = 0.12;
  const f2da  = 2;  // 2d/a where a = d
  const vRdc_calc = CRdc * k * Math.pow(100 * rhoL * fck, 1 / 3) * f2da;
  const vmin      = 0.035 * Math.pow(k, 1.5) * Math.sqrt(fck) * f2da;
  const vRdc      = Math.max(vRdc_calc, vmin);  // MPa

  /* One-way shear check at critical section on high-pressure side (6.4 – esforço transverso) */
  const canSection = a0x > d && MEd_kNm >= 0;
  let VEd_sect = null, VRd_sect = null, ok_sect = null;
  if (canSection) {
    const stripAvg   = (sigma1 + sigma3) / 2;                    // kN/m²
    const cornerArea = a0y > d ? Math.pow(a0y - d, 2) : 0;       // m² (two corner triangles)
    VEd_sect = Math.max(0, stripAvg * (a0x - d) * By - sigma3 * cornerArea);  // kN
    const bPrime = by + d;                                        // effective section width  m
    VRd_sect = vRdc * 1000 * bPrime * d;                          // kN  (vRdc MPa → kPa ×area)
    ok_sect  = VRd_sect >= VEd_sect;
  }

  /* Check at column face (crushing) */
  const u_col   = 2 * (bx + by);
  const vEd_col = VEd_kN / (u_col * d) * 0.001;  // MPa
  const nu_v    = 0.6 * (1 - fck / 250);
  const fcd     = fck / 1.5;
  const vRd_max = 0.5 * nu_v * fcd;               // MPa

  /* Reinforcement design (bending at footing base) */
  const fyd_kPa = (fyk / 1.15) * 1000;  // kN/m²

  // x-direction: trapezoidal pressure on cantilever lx
  const lx      = a0x + 0.15 * bx;                              // cantilever arm [m]
  const sigma_lx = sigma1 - (sigma1 - sigma2) * lx / Bx;       // stress at critical bending section
  const M_Ed1    = sigma_lx * lx * lx * By / 2
                 + (sigma1 - sigma_lx) * lx * lx * By / 3;     // [kNm]
  const Asx_m2   = M_Ed1 / (0.85 * d * fyd_kPa);               // [m²]
  const Asx_cm2  = Asx_m2 * 1e4;                                 // [cm²] total over By
  const Asx_cm2m = Asx_cm2 / By;                                 // [cm²/m]

  // y-direction: rectangular equivalent pressure on cantilever ly
  const ly       = a0y + 0.15 * by;                             // cantilever arm [m]
  const sigma_ref = (sigma_avg + sigma1) / 2;                   // average over right half [kN/m²]
  const M_Ed2    = sigma_ref * Bx * ly * ly / 2;                // [kNm]
  const Asy_m2   = M_Ed2 / (0.85 * d * fyd_kPa);               // [m²]
  const Asy_cm2  = Asy_m2 * 1e4;                                 // [cm²] total over Bx
  const Asy_cm2m = Asy_cm2 / Bx;                                 // [cm²/m]

  return {
    d, d_mm, k, a0x, a0y,
    u_crit, A_crit, A_foot,
    sigma_avg, sigma_M, sigma1, sigma2, sigma3,
    VEd_red, vEd,
    rhoL, CRdc, f2da, vRdc_calc, vmin, vRdc,
    canSection, VEd_sect, VRd_sect, ok_sect,
    u_col, vEd_col, nu_v, fcd, vRd_max,
    fyd_kPa,
    lx, sigma_lx, M_Ed1, Asx_cm2, Asx_cm2m,
    ly, sigma_ref, M_Ed2, Asy_cm2, Asy_cm2m,
    critExceedsX: d > a0x,
    critExceedsY: d > a0y,
    ok:     vEd     <= vRdc,
    ok_col: vEd_col <= vRd_max,
    UCR:     +(vEd     / vRdc    ).toFixed(3),
    UCR_col: +(vEd_col / vRd_max ).toFixed(3),
  };
}

/* ── Footing diagram (plan + elevation) ─────────────────────────────────── */
function FootingDiagram({ bxCol, byCol, Bx, By, hFoot, result }) {
  const bxC = Math.max(+bxCol || 0.40, 0.05);
  const byC = Math.max(+byCol || 0.40, 0.05);
  const BxF = Math.max(+Bx    || 1.50, bxC + 0.01);
  const ByF = Math.max(+By    || 1.50, byC + 0.01);
  const hFV = Math.max(+hFoot || 0.40, 0.05);
  const dV  = (result && !result.error) ? result.d : Math.max(hFV - 0.08, 0.05);

  const W = 300, HP = 252, GAP = 18, HE = 178, HTOT = HP + GAP + HE;

  /* ---- Plan view ---- */
  const PAD = 44;
  const sc  = Math.min((W - 2*PAD) / BxF, (HP - 2*PAD) / ByF);
  const fW  = BxF * sc, fH = ByF * sc;
  const foxP = (W - fW) / 2, foyP = (HP - fH) / 2;

  const cW = bxC * sc, cH = byC * sc;
  const cxP = foxP + (fW - cW) / 2;
  const cyP = foyP + (fH - cH) / 2;
  const dS  = dV * sc;

  /* ---- Elevation view ---- */
  const EY0   = HP + GAP;
  const PAD_EX = 44, PAD_EY = 12;
  const STUB  = 32;
  const scE   = Math.min((W - 2*PAD_EX) / BxF, (HE - 2*PAD_EY - STUB - 22) / hFV);
  const efW   = BxF * scE, efH = hFV * scE;
  const eox   = (W - efW) / 2;
  const eoy   = EY0 + PAD_EY + STUB;
  const ecW   = bxC * scE;
  const ecX   = eox + (efW - ecW) / 2;
  const dSE   = dV * scE;

  /* 45° cone endpoints */
  const coneL  = Math.max(ecX - dSE, eox);
  const coneR  = Math.min(ecX + ecW + dSE, eox + efW);
  const coneY  = eoy + dSE;

  const T  = { fontSize: 10, fontFamily: "Arial, sans-serif", fill: "#333" };
  const TB = { fontSize: 10, fontFamily: "Arial, sans-serif", fill: "#2c5282" };
  const TR = { fontSize: 10, fontFamily: "Arial, sans-serif", fill: "#c0392b" };
  const TG = { fontSize: 9,  fontFamily: "Arial, sans-serif", fill: "#888" };

  return (
    <svg width={W} height={HTOT} style={{ display:"block", margin:"0 auto" }}>
      <defs>
        <pattern id="hatch45" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="8" stroke="#777" strokeWidth="1" opacity="0.55"/>
        </pattern>
        <clipPath id="footPlanClip">
          <rect x={foxP} y={foyP} width={fW} height={fH}/>
        </clipPath>
        <clipPath id="footElevClip">
          <rect x={eox} y={eoy} width={efW} height={efH}/>
        </clipPath>
      </defs>

      {/* ======== PLAN VIEW ======== */}
      <text x={W/2} y={9} textAnchor="middle" style={{...TG, letterSpacing:"0.12em"}}>VISTA SUPERIOR</text>

      {/* Footing */}
      <rect x={foxP} y={foyP} width={fW} height={fH} fill="#eceef2" stroke="#1a1e2e" strokeWidth={1.5}/>

      {/* Area inside critical perimeter (lighter) */}
      <g clipPath="url(#footPlanClip)">

        {/* Critical perimeter — EC2 rounded corners (quarter-circles radius d) */}
        <rect x={cxP - dS} y={cyP - dS} width={cW + 2*dS} height={cH + 2*dS}
          rx={dS} ry={dS} fill="none" stroke="#c0392b" strokeWidth={1.5} strokeDasharray="5,3"/>

      {/* Column (hatched) */}
      <rect x={cxP} y={cyP} width={cW} height={cH} fill="url(#hatch45)" stroke="#1a1e2e" strokeWidth={1.5}/>

      {/* Dim: Bx (top) */}
      <line x1={foxP} y1={foyP-16} x2={foxP+fW} y2={foyP-16} stroke="#555" strokeWidth={0.8}/>
      <line x1={foxP} y1={foyP-22} x2={foxP} y2={foyP-10} stroke="#555" strokeWidth={0.8}/>

      <polygon points={`${foxP+fW-5},${foyP-16} ${foxP+fW-10},${foyP-19} ${foxP+fW-10},${foyP-13}`} fill="#555"/>

      <polygon points={`${foxP-16},${foyP+fH-5} ${foxP-19},${foyP+fH-10} ${foxP-13},${foyP+fH-10}`} fill="#555"/>
      <text x={foxP-28} y={foyP+fH/2} textAnchor="middle"

        B_y = {ByF.toFixed(2)} m

      {/* d annotation (column face → critical perimeter) */}
      <line x1={cxP+cW} y1={cyP+cH/2} x2={cxP+cW+dS} y2={cyP+cH/2}

      <line x1={cxP+cW} y1={cyP+cH/2-4} x2={cxP+cW} y2={cyP+cH/2+4} stroke="#c0392b" strokeWidth={1}/>
      <line x1={cxP+cW+dS} y1={cyP+cH/2-4} x2={cxP+cW+dS} y2={cyP+cH/2+4} stroke="#c0392b" strokeWidth={1}/>
      <text x={cxP+cW+dS/2} y={cyP+cH/2-6} textAnchor="middle" style={{...TR, fontStyle:"italic"}}>d</text>

      {/* Separator */}
      <line x1={24} y1={HP+GAP/2} x2={W-24} y2={HP+GAP/2} stroke="#e0e2e8" strokeWidth={1}/>
      <text x={W/2} y={HP+GAP/2+4} textAnchor="middle" style={{...TG, letterSpacing:"0.10em"}}>CORTE</text>

      {/* ======== ELEVATION VIEW ======== */}

      {/* Column stub */}
      <rect x={ecX} y={eoy-STUB} width={ecW} height={STUB}

      {/* Footing cross-section */}
      <rect x={eox} y={eoy} width={efW} height={efH} fill="#eceef2" stroke="#1a1e2e" strokeWidth={1.5}/>

      <g clipPath="url(#footElevClip)">

      {/* h annotation (left side) */}
      <line x1={eox-16} y1={eoy} x2={eox-16} y2={eoy+efH} stroke="#555" strokeWidth={0.9}/>
      <line x1={eox-22} y1={eoy}    x2={eox-10} y2={eoy}    stroke="#555" strokeWidth={0.9}/>

      <polygon points={`${eox-16},${eoy+efH-5} ${eox-19},${eoy+efH-11} ${eox-13},${eoy+efH-11}`} fill="#555"/>

      </text>

      {/* σEd arrows (soil reaction upward) */}

          <g key={i}>

      {/* "45°" angle label on cone */}
      {dSE > 20 && (
        <text x={ecX - dSE*0.55} y={eoy + dSE*0.42} style={{...TR, fontSize:9}}>45°</text>

  );
}

/* ── Section diagram (existing bending modes) ───────────────────────────── */
function SectionDiagram({ mode, b_m, d_m, h_m, dp_m, result }) {
  const W = 300, H = 310;
  const LEFT = 68, RIGHT = 52, TOP = 18, BOT = 50;
  const aw = W - LEFT - RIGHT, ah = H - TOP - BOT;

  const bv  = Math.max(+b_m  || 0.001, 0.001);
  const hv  = Math.max(+h_m  || 0.001, 0.001);
  const dv  = mode === "simple" ? (+d_m || 0.45) : (+dp_m || 0.45);
  const dpv = +dp_m || 0.45;

  const sc = Math.min(aw / bv, ah / hv);
  const sW = bv * sc, sH = hv * sc;
  const ox = LEFT + (aw - sW) / 2;
  const oy = TOP  + (ah - sH) / 2;

  const xNA = result && !result.error ? Math.min(result.xNA_m || 0, hv) : null;
  const xNA_y = xNA !== null ? oy + xNA * sc : null;

  const yTens = oy + dv * sc;
  const yComp = mode === "composed" ? oy + (hv - dpv) * sc : null;
  const coverH = mode === "simple" ? (hv - dv) * sc : 0;
  const lam = (result && result.lambda) || 0.8;
  const blockH = xNA !== null ? Math.min(xNA, hv) * sc : 0;

  const T  = { fontSize: 11, fontFamily: "Arial, sans-serif", fill: "#333" };
  const TB = { fontSize: 11, fontFamily: "Arial, sans-serif", fill: "#2c5282" };
  const TR = { fontSize: 10, fontFamily: "Arial, sans-serif", fill: "#c0392b" };
  const TG = { fontSize: 10, fontFamily: "Arial, sans-serif", fill: "#888" };

  const Arrow = ({ x1, y1, x2, y2, col="#555" }) => {
    const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy);
    if (len < 2) return null;
    const ux = dx/len, uy = dy/len, as = 5;
    return (
      <g>
        <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={col} strokeWidth={1}/>
        <polygon points={`${x2},${y2} ${x2-ux*as-uy*as*0.5},${y2-uy*as+ux*as*0.5} ${x2-ux*as+uy*as*0.5},${y2-uy*as-ux*as*0.5}`} fill={col}/>
        <polygon points={`${x1},${y1} ${x1+ux*as-uy*as*0.5},${y1+uy*as+ux*as*0.5} ${x1+ux*as+uy*as*0.5},${y1+uy*as-ux*as*0.5}`} fill={col}/>
      </g>
    );
  };

  return (
    <svg width={W} height={H} style={{ display: "block", margin: "0 auto" }}>
      {mode === "simple" && coverH > 1 && (
        <rect x={ox} y={oy + sH - coverH} width={sW} height={coverH} fill="rgba(200,200,200,0.18)" stroke="none"/>
      )}
      {blockH > 1 && (
        <rect x={ox} y={oy} width={sW} height={blockH} fill="rgba(44,82,130,0.15)" stroke="none"/>
      )}
      <rect x={ox} y={oy} width={sW} height={sH} fill="none" stroke="#1a1e2e" strokeWidth={1.8}/>
      {[0.2, 0.4, 0.6, 0.8].map((f, i) => (
        <line key={i} x1={ox} y1={oy + f*sH} x2={ox+10} y2={oy + f*sH} stroke="#ccc" strokeWidth={0.8}/>
      ))}
      {mode === "simple" && coverH > 4 && (
        <line x1={ox} y1={yTens} x2={ox+sW} y2={yTens} stroke="#aaa" strokeWidth={0.8} strokeDasharray="4,3"/>
      )}
      {xNA_y !== null && xNA_y > oy+2 && xNA_y < oy+sH-2 && (
        <>
          <line x1={ox-10} y1={xNA_y} x2={ox+sW+10} y2={xNA_y} stroke="#c0392b" strokeWidth={1.2} strokeDasharray="6,3"/>
          <text x={ox-12} y={xNA_y-3} textAnchor="end" style={TR}>x</text>
        </>
      )}
      {[0.22, 0.5, 0.78].map((f, i) => (
        <circle key={i} cx={ox + f*sW} cy={yTens} r={5.5} fill="#1a1e2e" stroke="#f4f5f7" strokeWidth={1}/>
      ))}
      {mode === "composed" && yComp !== null && [0.22, 0.5, 0.78].map((f, i) => (
        <circle key={i} cx={ox + f*sW} cy={yComp} r={5.5} fill="#fff" stroke="#1a1e2e" strokeWidth={1.5}/>
      ))}
      <Arrow x1={ox} y1={oy+sH+18} x2={ox+sW} y2={oy+sH+18}/>
      <line x1={ox}    y1={oy+sH+5} x2={ox}    y2={oy+sH+22} stroke="#555" strokeWidth={1}/>
      <line x1={ox+sW} y1={oy+sH+5} x2={ox+sW} y2={oy+sH+22} stroke="#555" strokeWidth={1}/>
      <text x={ox+sW/2} y={oy+sH+34} textAnchor="middle" style={{...TB, fontStyle:"italic"}}>
        b = {(bv*100).toFixed(0)} cm
      </text>
      <Arrow x1={ox+sW+18} y1={oy} x2={ox+sW+18} y2={oy+sH}/>
      <line x1={ox+sW+10} y1={oy}    x2={ox+sW+26} y2={oy}    stroke="#555" strokeWidth={1}/>
      <line x1={ox+sW+10} y1={oy+sH} x2={ox+sW+26} y2={oy+sH} stroke="#555" strokeWidth={1}/>
      <text x={ox+sW+36} y={oy+sH/2} textAnchor="middle" style={{...TB, fontStyle:"italic"}}
        transform={`rotate(-90,${ox+sW+36},${oy+sH/2})`}>
        h = {(hv*100).toFixed(0)} cm
      </text>
      <Arrow x1={ox-20} y1={oy} x2={ox-20} y2={yTens} col="#2c5282"/>
      <line x1={ox-28} y1={oy}    x2={ox-12} y2={oy}    stroke="#2c5282" strokeWidth={1}/>
      <line x1={ox-28} y1={yTens} x2={ox-12} y2={yTens} stroke="#2c5282" strokeWidth={1}/>
      <text x={ox-32} y={oy+(yTens-oy)/2+4} textAnchor="middle" style={{...TB, fontStyle:"italic", fontSize:10}}
        transform={`rotate(-90,${ox-32},${oy+(yTens-oy)/2})`}>
        {mode==="composed" ? "a" : "d"} = {(dv*100).toFixed(0)} cm
      </text>
      {mode === "simple" && coverH > 12 && (
        <>
          <Arrow x1={ox-20} y1={yTens} x2={ox-20} y2={oy+sH} col="#aaa"/>
          <line x1={ox-28} y1={oy+sH} x2={ox-12} y2={oy+sH} stroke="#aaa" strokeWidth={1}/>
          <text x={ox-32} y={yTens+(coverH)/2+4} textAnchor="middle"
            style={{...TG, fontSize:9}} transform={`rotate(-90,${ox-32},${yTens+coverH/2})`}>
            h−d={(((hv-dv)*100).toFixed(1))}cm
          </text>
        </>
      )}
      {mode==="composed" && yComp !== null && (
        <>
          <line x1={ox-8} y1={oy}     x2={ox-8} y2={yComp} stroke="#aaa" strokeWidth={1} strokeDasharray="3,2"/>
          <line x1={ox-13} y1={oy}    x2={ox-3} y2={oy}    stroke="#aaa" strokeWidth={1}/>
          <line x1={ox-13} y1={yComp} x2={ox-3} y2={yComp} stroke="#aaa" strokeWidth={1}/>
          <text x={ox-32} y={oy+(yComp-oy)/2+4} textAnchor="middle"
            style={{...TG, fontSize:9}} transform={`rotate(-90,${ox-32},${oy+(yComp-oy)/2})`}>
            d′={(((hv-dpv)*100).toFixed(1))}cm
          </text>
          <text x={ox+sW+8} y={yComp+4} style={{...TG, fontStyle:"italic"}}>A_s′</text>
        </>
      )}
      <text x={ox+sW+8} y={yTens+4} style={{...T, fontStyle:"italic"}}>A_s</text>
      {xNA_y !== null && xNA_y > oy+8 && xNA_y < oy+sH-8 && (
        <text x={ox+sW+8} y={xNA_y-3} style={{...TR, fontStyle:"italic"}}>
          x={((xNA_y-oy)/sc*100).toFixed(0)}cm
        </text>
      )}
      {blockH > 22 && (
        <text x={ox+sW/2} y={oy+blockH/2+4} textAnchor="middle"
          style={{fontSize:9, fontFamily:"Arial,sans-serif", fill:"#2c5282"}}>zona comp.</text>
      )}
    </svg>
  );
}

/* ── UI helpers ─────────────────────────────────────────────────────────── */
function Field({ label, note, children }) {
  return (
    <div className="field">
      <label>{label}</label>
      {children}
      {note && <div className="field-note">{note}</div>}
    </div>
  );
}
function Num({ label, value, onChange, unit, step="0.01", note }) {
  return (
    <Field label={label} note={note}>
      <div style={{position:"relative"}}>
        <input type="number" value={value} step={step} onChange={e=>onChange(e.target.value)}
          style={{paddingRight: unit ? 52 : 10}}/>
        {unit && <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
          fontSize:12,color:"#888",pointerEvents:"none"}}>{unit}</span>}
      </div>
    </Field>
  );
}
function Sel({ label, value, onChange, options }) {
  return (
    <Field label={label}>
      <select value={value} onChange={e=>onChange(e.target.value)}>
        {options.map((o,i)=><option key={i} value={i}>{o.l}</option>)}
      </select>
    </Field>
  );
}
function Row({ name, sub, value, unit, hl, ok, err }) {
  const cls = "result-row" + (hl?" hl":"") + (ok?" ok-row":"") + (err?" err-row":"");
  const valCls = "result-val" + (hl?" hl":"") + (ok?" ok":"") + (err?" err":"");
  return (
    <div className={cls}>
      <div>
        <div className="result-name">{name}</div>
        {sub && <div className="result-sub">{sub}</div>}
      </div>
      <div className={valCls}>
        {value}{unit && <span className="result-unit">{unit}</span>}
      </div>
    </div>
  );
}
function Badge({ domain }) {
  const cls = !domain ? "" : domain.includes("4") || domain.includes("5") ? " warn" : " ok";
  return <span className={"badge"+cls}>{domain || "—"}</span>;
}

/* ── App ────────────────────────────────────────────────────────────────── */
function App() {
  const [mode, setMode] = useState("simple");

  /* Bending state */
  const [fckI, setFckI] = useState(4);
  const [fykI, setFykI] = useState(1);
  const [b,  setB]  = useState("0.30");
  const [d,  setD]  = useState("0.45");
  const [h,  setH]  = useState("0.50");
  const [dp, setDp] = useState("0.45");
  const [MEd, setMEd] = useState("150");
  const [NEd, setNEd] = useState("0");

  /* Punching state */
  const [bxCol,   setBxCol]   = useState("0.50");
  const [byCol,   setByCol]   = useState("0.50");
  const [BxFoot,  setBxFoot]  = useState("1.50");
  const [ByFoot,  setByFoot]  = useState("1.50");
  const [hFoot,   setHFoot]   = useState("0.40");
  const [covFoot, setCovFoot] = useState("0.05");
  const [phiFoot, setPhiFoot] = useState("20");
  const [rhoFoot, setRhoFoot] = useState("0.30");
  const [VEdFoot, setVEdFoot] = useState("600");
  const [MEdFoot, setMEdFoot] = useState("0");

  const fck = CONCRETE[+fckI].fck, fyk = STEEL[+fykI].fyk;
  const fcd = +(fck/1.5).toFixed(2), fyd = +(Math.min(fyk/1.15,600)).toFixed(2);

  /* Bending result */
  const bendResult = useCallback(() => {
    if (mode === "simple")   return solvePureBending(+MEd, +b, +d, fck, fyk);
    if (mode === "composed") return solveBendingAxial(+MEd, +NEd, +b, +h, +dp, fck, fyk);
    return null;
  }, [mode,MEd,NEd,b,d,h,dp,fck,fyk])();

  /* Punching result */
  const punchResult = mode === "punching"
    ? solvePunching(+bxCol,+byCol,+BxFoot,+ByFoot,+hFoot,+covFoot,+phiFoot,+rhoFoot,+VEdFoot,+MEdFoot,fck,fyk)
    : null;

  /* Bending section props */
  const bv = +b||0, hv = +h||0, dv = +d||0, dpv = +dp||0;
  const d_eff  = mode==="simple" ? dv : dpv;
  const Ac_cm2 = (bv*100 * hv*100).toFixed(0);
  const I_cm4  = ((bv*100) * Math.pow(hv*100, 3) / 12).toFixed(0);
  const W_cm3  = ((bv*100) * Math.pow(hv*100, 2) / 6).toFixed(0);
  const rho_pct = bendResult && !bendResult.error
    ? (mode==="simple"
        ? bendResult.As_cm2 / (bv*100 * d_eff*100) * 100
        : bendResult.As_each_cm2 / (bv*100 * d_eff*100) * 100
      ).toFixed(3)
    : null;
  const ecu3_str = bendResult && bendResult.ecu3 ? (bendResult.ecu3*1000).toFixed(2)+"‰" : "3.50‰";

  return (
    <div className="page">
      {/* Header */}
      <div className="header">
        <div className="header-top">
          <span className="header-code">EN 1992-1-1 · EC2</span>
          <h1>Dimensionamento de Secções Rectangulares de Betão Armado</h1>
        </div>
        <div className="header-sub">
          Bloco rectangular de tensões &nbsp;·&nbsp; γ<sub>c</sub> = 1.5 &nbsp;·&nbsp; γ<sub>s</sub> = 1.15 &nbsp;·&nbsp; Paulo Mendes | ULP 2025/2026
        </div>
      </div>

      {/* Mode */}
      <div className="mode-row">
        <button className={"mode-btn"+(mode==="simple"?" active":"")} onClick={()=>setMode("simple")}>
          Flexão Simples &nbsp;(M)
        </button>
        <button className={"mode-btn"+(mode==="composed"?" active":"")} onClick={()=>setMode("composed")}>
          Flexão Composta &nbsp;(M + N)
        </button>
        <button className={"mode-btn"+(mode==="punching"?" active":"")} onClick={()=>setMode("punching")}>
          Punçoamento &nbsp;(Sapata)
        </button>
      </div>

      {/* ════════════ PUNCHING MODE ════════════ */}
      {mode === "punching" && (
        <div className="layout">
          {/* Left: inputs */}
          <div>
            {/* Materials */}
            <div className="panel">
              <div className="panel-title">Materiais</div>
              <Sel label="Classe de betão" value={fckI} onChange={setFckI} options={CONCRETE}/>
              <Sel label="Aço" value={fykI} onChange={setFykI} options={STEEL}/>
              <div className="mat-row">
                <div className="mat-chip">
                  <div className="mat-chip-lbl">f<sub>cd</sub> = f<sub>ck</sub> / γ<sub>c</sub></div>
                  <div className="mat-chip-val">{fcd} <span className="mat-chip-unit">MPa</span></div>
                </div>
                <div className="mat-chip">
                  <div className="mat-chip-lbl">f<sub>yd</sub> = f<sub>yk</sub> / γ<sub>s</sub></div>
                  <div className="mat-chip-val">{fyd} <span className="mat-chip-unit">MPa</span></div>
                </div>
              </div>
            </div>

            {/* Column geometry */}
            <div className="panel">
              <div className="panel-title">Geometria do pilar</div>
              <Num label="Dimensão b_x (direcção x)" value={bxCol} onChange={setBxCol} unit="m" step="0.05"/>
              <Num label="Dimensão b_y (direcção y)" value={byCol} onChange={setByCol} unit="m" step="0.05"/>
            </div>

            {/* Footing geometry */}
            <div className="panel">
              <div className="panel-title">Geometria da sapata</div>
              <Num label="Comprimento B_x" value={BxFoot} onChange={setBxFoot} unit="m" step="0.05"/>
              <Num label="Largura B_y"     value={ByFoot} onChange={setByFoot} unit="m" step="0.05"/>
              <Num label="Altura total h"  value={hFoot}  onChange={setHFoot}  unit="m" step="0.05"/>
              <Num label="Recobrimento c"  value={covFoot} onChange={setCovFoot} unit="m" step="0.005"
                note="Até à face exterior das armaduras"/>
              <Num label="Diâmetro das armaduras φ" value={phiFoot} onChange={setPhiFoot} unit="mm" step="2"/>
              <Num label="Taxa de armadura ρ_l"     value={rhoFoot} onChange={setRhoFoot} unit="%" step="0.05"
                note="Média das duas direcções (≤ 2%)"/>
              {punchResult && !punchResult.error && (
                <div className="sec-props" style={{marginTop:10}}>
                  <div className="sec-props-title">Parâmetros de cálculo</div>
                  <table><tbody>
                    <tr><td>Altura útil  d = h − c − φ/2</td><td>{(punchResult.d*100).toFixed(1)} cm</td></tr>
                    <tr><td>Factor k = 1 + √(200/d)</td><td>{punchResult.k.toFixed(3)}</td></tr>
                    <tr><td>a<sub>0,x</sub> = (B_x − b_x)/2</td><td>{(punchResult.a0x*100).toFixed(1)} cm</td></tr>
                    <tr><td>a<sub>0,y</sub> = (B_y − b_y)/2</td><td>{(punchResult.a0y*100).toFixed(1)} cm</td></tr>
                  </tbody></table>
                </div>
              )}
            </div>

            {/* Load */}
            <div className="panel">
              <div className="panel-title">Acções</div>
              <Num label="Força vertical total V_Ed = N_Ed + p.p" value={VEdFoot} onChange={setVEdFoot} unit="kN" step="10"
                note="Inclui o peso próprio da sapata"/>
              <Num label="Momento flector M_Ed,y" value={MEdFoot} onChange={setMEdFoot} unit="kN·m" step="10"
                note="Positivo → σ₁ na face direita (x positivo). 0 para sapata centrada."/>
              {punchResult && !punchResult.error && (
                <div className="sec-props" style={{marginTop:10}}>
                  <div className="sec-props-title">Pressões do solo</div>
                  <table><tbody>
                    <tr><td>σ<sub>méd</sub> = V_Ed / (B_x·B_y)</td><td>{punchResult.sigma_avg.toFixed(2)} kN/m²</td></tr>
                    <tr><td>σ₁ = σ<sub>méd</sub> + 6M/(B_y·B_x²)</td><td>{punchResult.sigma1.toFixed(2)} kN/m²</td></tr>
                    <tr><td>σ₂ = σ<sub>méd</sub> − 6M/(B_y·B_x²)</td><td>{punchResult.sigma2.toFixed(2)} kN/m²</td></tr>
                    {punchResult.canSection && (
                      <tr><td>σ₃ (face direita do perímetro crítico)</td><td>{punchResult.sigma3.toFixed(2)} kN/m²</td></tr>
                    )}
                  </tbody></table>
                </div>
              )}
            </div>
          </div>

          {/* Right: diagram + results */}
          <div>
            <div className="diagram-panel">
              <div className="panel-title">Diagrama da sapata</div>
              <FootingDiagram
                bxCol={bxCol} byCol={byCol} Bx={BxFoot} By={ByFoot}
                hFoot={hFoot} result={punchResult}/>
              <div className="diagram-caption">
                Zona vermelha tracejada = perímetro crítico u₁ a d da face do pilar &nbsp;·&nbsp; Zona cinzenta escura = pilar
              </div>
            </div>

            <div className="results-panel">
              <div className="panel-title">Verificação ao punçoamento — EN 1992-1-1 6.4</div>

              {punchResult && punchResult.error ? (
                <div className="error-box">⚠  {punchResult.error}</div>
              ) : punchResult ? (<>

                {(punchResult.critExceedsX || punchResult.critExceedsY) && (
                  <div className="warn-box">
                    ⚠ O perímetro crítico a d excede o contorno da sapata
                    {punchResult.critExceedsX ? ` (direcção x: d=${(punchResult.d*100).toFixed(1)} cm > a₀ₓ=${(punchResult.a0x*100).toFixed(1)} cm)` : ""}
                    {punchResult.critExceedsY ? ` (direcção y: d=${(punchResult.d*100).toFixed(1)} cm > a₀ᵧ=${(punchResult.a0y*100).toFixed(1)} cm)` : ""}.
                    O perímetro crítico fica limitado à aresta da sapata.
                  </div>
                )}

                <div className="section-label">Perímetro de controlo</div>
                <Row name="u₁ = 2(b_x + b_y) + 2πd"
                  sub={`= 2(${(+bxCol).toFixed(2)} + ${(+byCol).toFixed(2)}) + 2π×${punchResult.d.toFixed(3)}`}
                  value={punchResult.u_crit.toFixed(3)} unit="m"/>
                <Row name="A_crit = b_x·b_y + 2(b_x+b_y)·d + π·d²"
                  sub={`= ${(+bxCol).toFixed(2)}×${(+byCol).toFixed(2)} + 2(${(+bxCol).toFixed(2)}+${(+byCol).toFixed(2)})×${punchResult.d.toFixed(3)} + π×${punchResult.d.toFixed(3)}²`}
                  value={punchResult.A_crit.toFixed(4)} unit="m²"/>
                <Row name="A_sapata = B_x × B_y" value={punchResult.A_foot.toFixed(3)} unit="m²"/>

                <div className="section-label">Força de punçoamento</div>
                <Row name="σ_méd = (σ₁+σ₂)/2 = V_Ed / (B_x·B_y)" value={punchResult.sigma_avg.toFixed(2)} unit="kN/m²"/>
                <Row name="V_Ed,red = V_Ed − σ_méd × A_crit"
                  sub={`= ${(+VEdFoot).toFixed(1)} − ${punchResult.sigma_avg.toFixed(2)} × ${punchResult.A_crit.toFixed(4)}`}
                  value={punchResult.VEd_red.toFixed(2)} unit="kN"/>

                <div className="section-label">Tensão de punçoamento actuante</div>
                <Row name="v_Ed = V_Ed,red / (u_1 · d)"
                  sub={`= ${punchResult.VEd_red.toFixed(2)} / (${punchResult.u_crit.toFixed(3)} × ${punchResult.d.toFixed(3)}) × 10⁻³`}
                  value={punchResult.vEd.toFixed(4)} unit="MPa" hl/>

                <div className="section-label">Resistência ao punçoamento (sem armadura, 6.4.4)</div>
                <Row name="k = 1 + √(200/d)  [d em mm]"
                  sub={`= 1 + √(200/${punchResult.d_mm.toFixed(0)}) = ${punchResult.k.toFixed(3)} ≤ 2.0`}
                  value={punchResult.k.toFixed(3)}/>
                <Row name="v_Rd,c = C_Rd,c · k · (100·ρ_l·f_ck)^(1/3) · (2d/a)"
                  sub={`= 0.12 × ${punchResult.k.toFixed(3)} × (100×${(punchResult.rhoL*100).toFixed(3)}%×${fck})^(1/3) × ${punchResult.f2da}   [a = d]`}
                  value={punchResult.vRdc_calc.toFixed(4)} unit="MPa"/>
                <Row name="v_min = 0.035 · k^(3/2) · f_ck^(1/2) · (2d/a)"
                  sub={`× ${punchResult.f2da}  [a = d]`}
                  value={punchResult.vmin.toFixed(4)} unit="MPa"/>
                <Row name="v_Rd,c = max(v_Rd,c , v_min)"
                  value={punchResult.vRdc.toFixed(4)} unit="MPa" hl/>

                <div className="section-label">Verificação</div>
                <Row
                  name={punchResult.ok ? "✓  v_Ed ≤ v_Rd,c — VERIFICA" : "✗  v_Ed > v_Rd,c — NÃO VERIFICA"}
                  sub={`UC = v_Ed / v_Rd,c = ${punchResult.UCR}`}
                  value={`${(punchResult.UCR*100).toFixed(1)} %`}
                  ok={punchResult.ok} err={!punchResult.ok}/>

                {punchResult.canSection && (<>
                  <div className="section-label">Verificação ao esforço transverso — secção na face do perímetro crítico</div>
                  <Row name="V_Ed,sect = (σ₁+σ₃)/2 · (a₀ₓ−d) · B_y − σ₃ · (a₀ᵧ−d)²"
                    sub={`= (${punchResult.sigma1.toFixed(2)}+${punchResult.sigma3.toFixed(2)})/2 × ${(punchResult.a0x-punchResult.d).toFixed(3)} × ${(+ByFoot).toFixed(2)} − ${punchResult.sigma3.toFixed(2)} × ${(Math.max(0,punchResult.a0y-punchResult.d)**2).toFixed(4)}`}
                    value={punchResult.VEd_sect.toFixed(2)} unit="kN" hl/>
                  <Row name="b′ = b_y + d  (largura efectiva da secção)"
                    value={(+byCol + punchResult.d).toFixed(3)} unit="m"/>
                  <Row name="V_Rd = v_Rd,c · b′ · d  [v_Rd,c em kPa]"
                    sub={`= ${(punchResult.vRdc*1000).toFixed(1)} × ${(+byCol+punchResult.d).toFixed(3)} × ${punchResult.d.toFixed(3)}`}
                    value={punchResult.VRd_sect.toFixed(2)} unit="kN" hl/>
                  <Row
                    name={punchResult.ok_sect ? "✓  V_Rd ≥ V_Ed,sect — VERIFICA" : "✗  V_Rd < V_Ed,sect — NÃO VERIFICA"}
                    sub={`UC = ${(punchResult.VEd_sect/punchResult.VRd_sect).toFixed(3)}`}
                    value={`${(punchResult.VEd_sect/punchResult.VRd_sect*100).toFixed(1)} %`}
                    ok={punchResult.ok_sect} err={!punchResult.ok_sect}/>
                </>)}

                <div className="section-label">Verificação na face do pilar (esmagamento)</div>
                <Row name="u₀ = 2(b_x + b_y)  [perímetro do pilar]"
                  value={punchResult.u_col.toFixed(3)} unit="m"/>
                <Row name="v_Ed,max = V_Ed / (u₀ · d)"
                  value={punchResult.vEd_col.toFixed(4)} unit="MPa"/>
                <Row name="v_Rd,max = 0.5 · ν · f_cd"
                  sub={`ν = 0.6(1−${fck}/250) = ${punchResult.nu_v.toFixed(3)};  v_Rd,max = 0.5×${punchResult.nu_v.toFixed(3)}×${punchResult.fcd.toFixed(2)}`}
                  value={punchResult.vRd_max.toFixed(3)} unit="MPa"/>
                <Row
                  name={punchResult.ok_col ? "✓  v_Ed,max ≤ v_Rd,max — VERIFICA" : "✗  v_Ed,max > v_Rd,max — NÃO VERIFICA"}
                  sub={`UC = ${punchResult.UCR_col}`}
                  value={`${(punchResult.UCR_col*100).toFixed(1)} %`}
                  ok={punchResult.ok_col} err={!punchResult.ok_col}/>

                {/* ── Reinforcement design ── */}
                <div className="section-label">Dimensionamento da armadura de flexão</div>
                <Row name="l_x = a₀ₓ + 0.15·b_x"
                  sub={`= ${punchResult.a0x.toFixed(3)} + 0.15×${(+bxCol).toFixed(2)} = ${punchResult.lx.toFixed(3)} m`}
                  value={punchResult.lx.toFixed(3)} unit="m"/>
                <Row name="σ_lx (pressão na secção crítica de flexão, face de b_x)"
                  sub={`= σ₁ − (σ₁−σ₂)×l_x/B_x = ${punchResult.sigma1.toFixed(2)} − ${(punchResult.sigma1-punchResult.sigma2).toFixed(2)}×${punchResult.lx.toFixed(3)}/${(+BxFoot).toFixed(2)}`}
                  value={punchResult.sigma_lx.toFixed(2)} unit="kN/m²"/>
                <Row name="M_Ed,1 = σ_lx·l_x²·B_y/2 + (σ₁−σ_lx)·l_x²·B_y/3"
                  sub={`= ${punchResult.sigma_lx.toFixed(2)}×${punchResult.lx.toFixed(3)}²×${(+ByFoot).toFixed(2)}/2 + ${(punchResult.sigma1-punchResult.sigma_lx).toFixed(2)}×${punchResult.lx.toFixed(3)}²×${(+ByFoot).toFixed(2)}/3`}
                  value={punchResult.M_Ed1.toFixed(2)} unit="kNm" hl/>
                <Row name="A_sx = M_Ed,1 / (0.85·d·f_yd)  [total]"
                  sub={`= ${punchResult.M_Ed1.toFixed(2)} / (0.85×${punchResult.d.toFixed(3)}×${(punchResult.fyd_kPa/1000).toFixed(0)} MPa)`}
                  value={punchResult.Asx_cm2.toFixed(2)} unit="cm²" hl/>
                <Row name="A_sx  [por metro de largura, ÷ B_y]"
                  sub={`= ${punchResult.Asx_cm2.toFixed(2)} / ${(+ByFoot).toFixed(2)}`}
                  value={punchResult.Asx_cm2m.toFixed(2)} unit="cm²/m"/>

                <Row name="l_y = a₀ᵧ + 0.15·b_y"
                  sub={`= ${punchResult.a0y.toFixed(3)} + 0.15×${(+byCol).toFixed(2)} = ${punchResult.ly.toFixed(3)} m`}
                  value={punchResult.ly.toFixed(3)} unit="m"/>
                <Row name="σ_ref = (σ_méd + σ₁)/2  (pressão equivalente, direcção y)"
                  sub={`= (${punchResult.sigma_avg.toFixed(2)} + ${punchResult.sigma1.toFixed(2)})/2`}
                  value={punchResult.sigma_ref.toFixed(2)} unit="kN/m²"/>
                <Row name="M_Ed,2 = σ_ref·B_x·l_y²/2"
                  sub={`= ${punchResult.sigma_ref.toFixed(2)}×${(+BxFoot).toFixed(2)}×${punchResult.ly.toFixed(3)}²/2`}
                  value={punchResult.M_Ed2.toFixed(2)} unit="kNm" hl/>
                <Row name="A_sy = M_Ed,2 / (0.85·d·f_yd)  [total]"
                  sub={`= ${punchResult.M_Ed2.toFixed(2)} / (0.85×${punchResult.d.toFixed(3)}×${(punchResult.fyd_kPa/1000).toFixed(0)} MPa)`}
                  value={punchResult.Asy_cm2.toFixed(2)} unit="cm²" hl/>
                <Row name="A_sy  [por metro de largura, ÷ B_x]"
                  sub={`= ${punchResult.Asy_cm2.toFixed(2)} / ${(+BxFoot).toFixed(2)}`}
                  value={punchResult.Asy_cm2m.toFixed(2)} unit="cm²/m"/>

                <div className="ec2-note">
                  Referência: EN 1992-1-1, 6.4
                </div>
              </>) : null}
            </div>
          </div>
        </div>
      )}

      {/* ════════════ BENDING MODES ════════════ */}
      {mode !== "punching" && (
        <div className="layout">
          {/* Left column */}
          <div>
            <div className="panel">
              <div className="panel-title">Materiais</div>
              <Sel label="Classe de betão" value={fckI} onChange={setFckI} options={CONCRETE}/>
              <Sel label="Aço" value={fykI} onChange={setFykI} options={STEEL}/>
              <div className="mat-row">
                <div className="mat-chip">
                  <div className="mat-chip-lbl">f<sub>cd</sub> = f<sub>ck</sub> / γ<sub>c</sub></div>
                  <div className="mat-chip-val">{fcd} <span className="mat-chip-unit">MPa</span></div>
                </div>
                <div className="mat-chip">
                  <div className="mat-chip-lbl">f<sub>yd</sub> = f<sub>yk</sub> / γ<sub>s</sub></div>
                  <div className="mat-chip-val">{fyd} <span className="mat-chip-unit">MPa</span></div>
                </div>
              </div>
            </div>

            <div className="panel">
              <div className="panel-title">Geometria da secção</div>
              <Num label="Largura -  b" value={b} onChange={setB} unit="m" step="0.05"/>
              {mode === "simple" ? (
                <>
                  <Num label="Altura total - h" value={h} onChange={setH} unit="m" step="0.05"
                    note="Altura total da secção"/>
                  <Num label="Altura útil  d"
                    value={d} onChange={setD} unit="m" step="0.05"
                    note="Distância da face comprimida ao centróide da armadura de tracção"/>
                </>
              ) : (
                <>
                  <Num label="Altura total - h" value={h} onChange={setH} unit="m" step="0.05"/>
                  <Num label="a  —  Altura útil"
                    value={dp} onChange={setDp} unit="m" step="0.005"
                    note="Dist. da fibra mais comprimida ao c.g. da armadura de tracção  (d′ = h − a)"/>
                </>
              )}
              <div className="sec-props">
                <div className="sec-props-title">Propriedades da secção</div>
                <table><tbody>
                  <tr><td>Largura  b</td><td>{(bv*100).toFixed(0)} cm</td></tr>
                  {mode==="simple" ? (
                    <>
                      <tr><td>Altura total  h</td><td>{(hv*100).toFixed(0)} cm</td></tr>
                      <tr><td>Altura útil  d</td><td>{(dv*100).toFixed(0)} cm</td></tr>
                      <tr><td>Recobrimento  h − d</td><td>{((hv-dv)*100).toFixed(1)} cm</td></tr>
                    </>
                  ) : (
                    <>
                      <tr><td>Altura total  h</td><td>{(hv*100).toFixed(0)} cm</td></tr>
                      <tr><td>Altura útil  a = d</td><td>{(dpv*100).toFixed(1)} cm</td></tr>
                      <tr><td>d′ = h − a</td><td>{((hv-dpv)*100).toFixed(1)} cm</td></tr>
                      <tr><td>d′ / h</td><td>{((hv-dpv)/hv||0).toFixed(3)}</td></tr>
                    </>
                  )}
                  <tr><td>Área bruta  A<sub>c</sub> = b · h</td><td>{Ac_cm2} cm²</td></tr>
                  <tr><td>Inércia  I = b · h³ / 12</td><td>{Number(I_cm4).toLocaleString("pt")} cm⁴</td></tr>
                  <tr><td>Módulo  W = b · h² / 6</td><td>{Number(W_cm3).toLocaleString("pt")} cm³</td></tr>
                  {rho_pct && (
                    <tr><td className="hl">Taxa geométrica  ρ</td><td className="hl">{rho_pct} %</td></tr>
                  )}
                </tbody></table>
              </div>
            </div>

            <div className="panel">
              <div className="panel-title">Esforços de cálculo</div>
              <Num label="Momento  M_Ed" value={MEd} onChange={setMEd} unit="kN·m" step="1"/>
              {mode === "composed" && (
                <Num label="Esforço normal  N_Ed" value={NEd} onChange={setNEd} unit="kN" step="10"
                  note="Positivo = compressão"/>
              )}
            </div>
          </div>

          {/* Right column */}
          <div>
            <div className="diagram-panel">
              <div className="panel-title">Diagrama da secção transversal</div>
              <SectionDiagram mode={mode} b_m={b} d_m={d} h_m={h} dp_m={dp} result={bendResult}/>
              <div className="diagram-caption">
                Linha tracejada vermelha = eixo neutro (x) &nbsp;·&nbsp; Zona azul = zona comprimida (até x) &nbsp;·&nbsp; Círculos = armadura
                {mode==="simple" && <> &nbsp;·&nbsp; Zona cinzenta = h − d</>}
              </div>
            </div>

            <div className="results-panel">
              <div className="panel-title">Resultados do dimensionamento</div>
              {bendResult && bendResult.error ? (
                <div className="error-box">⚠  {bendResult.error}</div>
              ) : bendResult ? (<>
                <div className="section-label">Grandezas adimensionais</div>
                <Row name="μ  =  M_Ed / (b · d² · f_cd)"
                  sub={mode==="simple"
                    ? `= ${(MEd*1e6).toExponential(2)} / (${(bv*1e3).toFixed(0)} × ${(d_eff*1e3).toFixed(0)}² × ${fcd})  [N·mm]`
                    : `normalizado por b·h² — h = ${(hv*100).toFixed(0)} cm`}
                  value={bendResult.mu?.toFixed(5)}/>
                {mode==="composed" &&
                  <Row name="ν  =  N_Ed / (b · h · f_cd)" sub="positivo = compressão"
                    value={bendResult.nu?.toFixed(5)}/>}

                <div className="section-label">Linha neutra</div>
                <Row name={"ξ  =  x / "+(mode==="simple"?"d":"h")+" — posição relativa"}
                  value={bendResult.xi?.toFixed(4)}/>
                <Row name="x  — posição da linha neutra"
                  value={(bendResult.xNA_m ? (bendResult.xNA_m*100).toFixed(1) : (bendResult.xi*(mode==="simple"?dv:hv)*100).toFixed(1))} unit="cm"/>

                {mode==="composed" && (<>
                  <div className="section-label">Tensões no aço (ELU)</div>
                  <Row name="σ_s  — armadura comprimida (topo)"   value={bendResult.ss_c} unit="MPa"
                    sub={Math.abs(bendResult.ss_c)>=(fyd*0.99) ? "atingiu f_yd (cedência)" : "elástica"}/>
                  <Row name="σ_s  — armadura traccionada (base)" value={bendResult.ss_t} unit="MPa"
                    sub={Math.abs(bendResult.ss_t)>=(fyd*0.99) ? "atingiu f_yd (cedência)" : "elástica"}/>
                </>)}

                <div className="section-label">Taxa mecânica de armadura</div>
                <Row name="ω  =  A_s · f_yd / (b · d · f_cd)"
                  sub="valor equivalente ao lido nas tabelas de Barros & Figueiras"
                  value={bendResult.omega?.toFixed(5)} hl/>

                <div className="section-label">Armadura necessária</div>
                {mode==="simple" ? (<>
                  <Row name="A_s  =  ω · b · d · (f_cd / f_yd)"
                    value={bendResult.As_cm2?.toFixed(2)} unit="cm²" hl/>
                  {rho_pct && <Row name="Taxa geométrica  ρ  =  A_s / (b · d)"
                    value={rho_pct} unit="%"/>}
                </>) : (<>
                  <Row name="A_s,tot  =  ω · b · h · (f_cd / f_yd)"
                    value={bendResult.As_tot_cm2?.toFixed(2)} unit="cm²" hl/>
                  <Row name="A_s  =  A_s′  =  A_s,tot / 2  (armadura simétrica)"
                    value={bendResult.As_each_cm2?.toFixed(2)} unit="cm²  (cada face)"/>
                  {rho_pct && <Row name="Taxa geométrica  ρ  =  A_s / (b · d)"
                    value={rho_pct} unit="%"/>}
                </>)}

                <div className="ec2-note">
                  Parâmetros do bloco EC2: &nbsp; λ = {bendResult.lambda} &nbsp;·&nbsp; η = {bendResult.eta} &nbsp;·&nbsp; ε<sub>cu3</sub> = {ecu3_str}
                  {mode==="composed" && <><br/>Armadura simétrica assumida — A<sub>s</sub> = A<sub>s</sub>′ &nbsp;·&nbsp; d′/h = {((hv-dpv)/hv||0).toFixed(3)}</>}
                </div>
              </>) : null}
            </div>
          </div>
        </div>
      )}

      <div className="page-footer">
        EN 1992-1-1 &nbsp;·&nbsp; γ<sub>c</sub> = 1.5 &nbsp;·&nbsp; γ<sub>s</sub> = 1.15 &nbsp;·&nbsp;
        PJMEND | April 2026
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
