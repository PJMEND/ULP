<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EC2 — Dimensionamento de Secções</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f4f5f7;
  color: #1a1e2e;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 14px;
  min-height: 100vh;
}
input, select, button { font-family: Georgia, 'Times New Roman', serif; font-size: 14px; }

.page { max-width: 980px; margin: 0 auto; padding: 28px 16px 48px; }

/* Header */
.header { border-bottom: 2px solid #1a1e2e; padding-bottom: 12px; margin-bottom: 24px; }
.header-top { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
.header-code { font-size: 11px; font-family: monospace; color: #555; letter-spacing: 0.08em; border: 1px solid #ccc; padding: 2px 8px; border-radius: 3px; }
h1 { font-size: 20px; font-weight: normal; color: #1a1e2e; }
.header-sub { font-size: 12px; color: #666; margin-top: 4px; font-family: Arial, sans-serif; }

/* Mode toggle */
.mode-row { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid #1a1e2e; border-radius: 4px; overflow: hidden; width: fit-content; }
.mode-btn { padding: 8px 24px; background: #fff; color: #1a1e2e; border: none; cursor: pointer; font-size: 13px; transition: background 0.1s; border-right: 1px solid #1a1e2e; font-family: Arial, sans-serif; }
.mode-btn:last-child { border-right: none; }
.mode-btn.active { background: #1a1e2e; color: #fff; }

/* Layout */
.layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
@media (max-width: 700px) { .layout { grid-template-columns: 1fr; } }

/* Panels */
.panel { background: #fff; border: 1px solid #d0d4dc; border-radius: 6px; padding: 18px; margin-bottom: 16px; }
.panel-title {
  font-size: 11px; font-family: Arial, sans-serif; font-weight: bold;
  text-transform: uppercase; letter-spacing: 0.12em; color: #555;
  margin-bottom: 14px; padding-bottom: 6px; border-bottom: 1px solid #e8eaed;
}

/* Fields */
.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 12px; color: #444; margin-bottom: 4px; font-family: Arial, sans-serif; }
.field input, .field select {
  width: 100%; border: 1px solid #bbbec6; border-radius: 4px;
  padding: 7px 10px; color: #1a1e2e; background: #fff;
  transition: border-color 0.15s;
  -moz-appearance: textfield;
}
.field input::-webkit-outer-spin-button,
.field input::-webkit-inner-spin-button { -webkit-appearance: none; }
.field input:focus, .field select:focus { outline: none; border-color: #2c5282; box-shadow: 0 0 0 2px rgba(44,82,130,0.12); }
.field-note { font-size: 11px; color: #888; margin-top: 4px; font-family: Arial, sans-serif; }

/* Mat chips */
.mat-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.mat-chip { background: #f4f5f7; border: 1px solid #e0e2e8; border-radius: 4px; padding: 8px 10px; }
.mat-chip-lbl { font-size: 11px; font-family: Arial, sans-serif; color: #666; }
.mat-chip-val { font-size: 15px; font-family: monospace; color: #1a1e2e; margin-top: 2px; }
.mat-chip-unit { font-size: 11px; color: #888; }

/* Section props table */
.sec-props { background: #f8f9fb; border: 1px solid #e0e2e8; border-radius: 4px; padding: 10px 12px; margin-top: 10px; }
.sec-props-title { font-size: 11px; font-family: Arial,sans-serif; color: #555; font-weight: bold; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.sec-props table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: Arial, sans-serif; }
.sec-props td { padding-bottom: 4px; color: #555; }
.sec-props td:last-child { text-align: right; font-family: monospace; color: #1a1e2e; }
.sec-props td.hl { color: #2c5282; font-weight: bold; }

/* Diagram panel */
.diagram-panel { background: #fff; border: 1px solid #d0d4dc; border-radius: 6px; padding: 18px; margin-bottom: 16px; }
.diagram-caption { font-size: 11px; font-family: Arial,sans-serif; color: #999; text-align: center; margin-top: 8px; }

/* Results */
.results-panel { background: #fff; border: 1px solid #d0d4dc; border-radius: 6px; padding: 18px; }
.section-label {
  font-size: 11px; font-family: Arial, sans-serif; font-weight: bold;
  text-transform: uppercase; letter-spacing: 0.1em; color: #777;
  margin: 14px 0 6px; border-top: 1px solid #eee; padding-top: 10px;
}
.section-label:first-of-type { border-top: none; padding-top: 0; margin-top: 0; }

.result-row { display: flex; justify-content: space-between; align-items: baseline; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
.result-row.hl { background: #ebf4ff; margin: 0 -18px; padding: 8px 18px; border-bottom: 1px solid #c9dff5; }
.result-row:last-child { border-bottom: none; }
.result-name { font-size: 13px; color: #333; font-family: Arial, sans-serif; }
.result-sub  { font-size: 11px; color: #999; font-family: Arial, sans-serif; margin-top: 1px; }
.result-val  { font-family: monospace; font-size: 14px; color: #1a1e2e; white-space: nowrap; min-width: 90px; text-align: right; }
.result-val.hl { font-size: 16px; font-weight: bold; color: #2c5282; }
.result-unit { font-size: 11px; color: #888; margin-left: 3px; }

.error-box { background: #fff5f5; border: 1px solid #feb2b2; border-radius: 4px; padding: 12px; color: #c53030; font-size: 13px; font-family: Arial, sans-serif; line-height: 1.5; white-space: pre-line; }
.ec2-note { font-size: 11px; color: #888; font-family: Arial, sans-serif; line-height: 1.6; margin-top: 14px; padding-top: 10px; border-top: 1px solid #eee; }

.badge { display: inline-block; font-size: 11px; font-family: monospace; padding: 2px 8px; border-radius: 3px; border: 1px solid #bbb; background: #f8f8f8; color: #333; }
.badge.ok   { background: #f0fff4; border-color: #9ae6b4; color: #276749; }
.badge.warn { background: #fffaf0; border-color: #f6ad55; color: #7b341e; }
.badge.err  { background: #fff5f5; border-color: #feb2b2; color: #c53030; }

.page-footer { margin-top: 28px; font-size: 11px; color: #aaa; font-family: Arial, sans-serif; text-align: center; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback } = React;

/* ── Materials ─────────────────────────────────────────────────────────── */
const CONCRETE = [
  {l:"C12/15",fck:12},{l:"C16/20",fck:16},{l:"C20/25",fck:20},
  {l:"C25/30",fck:25},{l:"C30/37",fck:30},{l:"C35/45",fck:35},
  {l:"C40/50",fck:40},{l:"C45/55",fck:45},{l:"C50/60",fck:50},
  {l:"C55/67",fck:55},{l:"C60/75",fck:60},
];
const STEEL = [
  {l:"A400 NR  (fyk = 400 MPa)", fyk:400},
  {l:"A500 NR  (fyk = 500 MPa)", fyk:500},
  {l:"A600 NR  (fyk = 600 MPa)", fyk:600},
];

/* ── EC2 helpers ────────────────────────────────────────────────────────── */
function getLambdaEta(fck) {
  return {
    lambda: fck <= 50 ? 0.8 : 0.8 - (fck - 50) / 400,
    eta:    fck <= 50 ? 1.0 : 1.0 - (fck - 50) / 200,
  };
}
function getEcu3(fck) {
  return fck <= 50 ? 0.0035 : 0.0026 + 0.035 * Math.pow((90 - fck) / 100, 4);
}

/* ── Solver: pure bending ───────────────────────────────────────────────── */
function solvePureBending(MEd_kNm, b_m, d_m, fck, fyk) {
  const { lambda, eta } = getLambdaEta(fck);
  const fcd = fck / 1.5, fyd = Math.min(fyk / 1.15, 600);
  const ecu3 = getEcu3(fck), esy = fyd / 200000;
  const b = b_m * 1000, d = d_m * 1000;
  const mu = (MEd_kNm * 1e6) / (b * d * d * fcd);
  const disc = 1 - 2 * mu / eta;
  if (disc < 0 || mu >= 0.5 * eta)
    return { error: `μ = ${mu.toFixed(4)} excede a capacidade máxima da secção simplesmente armada.\nAumente b, d ou utilize armadura de compressão.` };
  const u = 1 - Math.sqrt(disc);
  const xi = u / lambda, zd = 1 - u / 2;
  const omega = eta * u;
  const xiLim = ecu3 / (ecu3 + esy);
  const domain = xi < ecu3 / (ecu3 + 0.01) ? "2" : xi <= xiLim ? "3" : "4";
  const As_cm2 = omega * b * d * (fcd / fyd) / 100;
  return {
    mu, omega, xi, zd,
    xNA_m: xi * d_m,
    z_m: zd * d_m,
    domain, As_cm2: +As_cm2.toFixed(2),
    fcd, fyd, lambda: +lambda.toFixed(3), eta: +eta.toFixed(3), ecu3,
  };
}

/* ── Solver: bending + axial ────────────────────────────────────────────── */
/* dp_m = a = d  (distância da fibra mais comprimida ao c.g. da armadura de tracção)
   d' = h - a  (distância da fibra comprimida ao c.g. da armadura de compressão)
   dph = d'/h = (h - a)/h                                                         */
function solveBendingAxial(MEd_kNm, NEd_kN, b_m, h_m, dp_m, fck, fyk) {
  const { lambda, eta } = getLambdaEta(fck);
  const fcd = fck / 1.5, fyd = Math.min(fyk / 1.15, 600);
  const Es = 200000, ecu3 = getEcu3(fck);
  const b = b_m * 1000, h = h_m * 1000, dph = (h_m - dp_m) / h_m;  // d'/h = (h-a)/h
  const mu = (MEd_kNm * 1e6) / (b * h * h * fcd);
  const nu = (NEd_kN  * 1e3) / (b * h * fcd);
  const strains = xi => ({
    es_c: ecu3 * (xi - dph) / xi,
    es_t: ecu3 * (xi - (1 - dph)) / xi,
  });
  let xi = 0.3, omega = 0.1;
  for (let i = 0; i < 400; i++) {
    xi = Math.max(0.005, Math.min(2.0, xi));
    const { es_c, es_t } = strains(xi);
    const ss_c = Math.max(-fyd, Math.min(fyd, es_c * Es));
    const ss_t = Math.max(-fyd, Math.min(fyd, es_t * Es));
    const fc = eta * lambda * xi;
    const sum_s = ss_c + ss_t;
    let omega_new = Math.abs(sum_s) > 0.5 ? (nu - fc) * 2 * fyd / sum_s : omega;
    omega_new = Math.max(0, omega_new);
    const mu_c = fc * (0.5 - lambda * xi / 2) + (omega_new / 2) * ((ss_c - ss_t) / fyd) * (0.5 - dph);
    const resid = mu_c - mu;
    const step = Math.max(-0.1, Math.min(0.1, -resid / (eta * lambda * (0.5 - lambda * xi) || 0.01)));
    xi += step * 0.6;
    if (Math.abs(resid) < 1e-9 && Math.abs(omega_new - omega) < 1e-9) { omega = omega_new; break; }
    omega = omega_new;
  }
  omega = Math.max(0, omega);
  const { es_c, es_t } = strains(xi);
  const ss_c = Math.max(-fyd, Math.min(fyd, es_c * Es));
  const ss_t = Math.max(-fyd, Math.min(fyd, es_t * Es));
  const As_tot = omega * b * h * (fcd / fyd) / 100;
  const esy = fyd / Es;
  const domain = es_t < -esy ? "2–3" : es_t < 0 ? "3–4" : xi < 1 ? "4" : "5";
  return {
    mu, nu, omega, xi, xNA_m: xi * h_m, domain,
    ss_c: +ss_c.toFixed(1), ss_t: +ss_t.toFixed(1),
    As_tot_cm2: +As_tot.toFixed(2), As_each_cm2: +(As_tot / 2).toFixed(2),
    fcd, fyd, lambda: +lambda.toFixed(3), eta: +eta.toFixed(3), ecu3,
  };
}

/* ── Section diagram ────────────────────────────────────────────────────── */
function SectionDiagram({ mode, b_m, d_m, h_m, dp_m, result }) {
  const W = 300, H = 310;
  /* Drawing area for the section */
  const LEFT = 68, RIGHT = 52, TOP = 18, BOT = 50;
  const aw = W - LEFT - RIGHT, ah = H - TOP - BOT;

  const bv  = Math.max(+b_m  || 0.001, 0.001);
  // Always use h for the section outline height
  const hv  = Math.max(+h_m  || 0.001, 0.001);
  // For simple bending: dv = d (input directly)
  // For composed:       dv = a = d (input directly — a is the effective depth)
  const dv  = mode === "simple" ? (+d_m || 0.45) : (+dp_m || 0.45);
  // dpv = a (effective depth) for composed; d' = h - a
  const dpv = +dp_m || 0.45;

  const sc = Math.min(aw / bv, ah / hv);
  const sW = bv * sc, sH = hv * sc;
  const ox = LEFT + (aw - sW) / 2;
  const oy = TOP  + (ah - sH) / 2;

  /* Neutral axis — position relative to top of section */
  const xNA = result && !result.error ? Math.min(result.xNA_m || 0, hv) : null;
  const xNA_y = xNA !== null ? oy + xNA * sc : null;

  /* Steel positions in SVG y:
     - tension steel at d from top (= dv)
     - compression steel at d' = h - a from top (composed mode) */
  const yTens = oy + dv * sc;
  const yComp = mode === "composed" ? oy + (hv - dpv) * sc : null;

  /* Cover zone at bottom for simple bending (h - d) */
  const coverH = mode === "simple" ? (hv - dv) * sc : 0;

  /* Compression zone — spans from top face down to neutral axis (x) */
  const lam = (result && result.lambda) || 0.8;
  const blockH = xNA !== null ? Math.min(xNA, hv) * sc : 0;

  /* Text styles */
  const T  = { fontSize: 11, fontFamily: "Arial, sans-serif", fill: "#333" };
  const TB = { fontSize: 11, fontFamily: "Arial, sans-serif", fill: "#2c5282" };
  const TR = { fontSize: 10, fontFamily: "Arial, sans-serif", fill: "#c0392b" };
  const TG = { fontSize: 10, fontFamily: "Arial, sans-serif", fill: "#888" };

  /* Arrow helper */
  const Arrow = ({ x1, y1, x2, y2, col="#555" }) => {
    const dx = x2-x1, dy = y2-y1, len = Math.sqrt(dx*dx+dy*dy);
    if (len < 2) return null;
    const ux = dx/len, uy = dy/len;
    const as = 5;
    return (
      <g>
        <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={col} strokeWidth={1}/>
        <polygon points={`${x2},${y2} ${x2-ux*as-uy*as*0.5},${y2-uy*as+ux*as*0.5} ${x2-ux*as+uy*as*0.5},${y2-uy*as-ux*as*0.5}`} fill={col}/>
        <polygon points={`${x1},${y1} ${x1+ux*as-uy*as*0.5},${y1+uy*as+ux*as*0.5} ${x1+ux*as+uy*as*0.5},${y1+uy*as-ux*as*0.5}`} fill={col}/>
      </g>
    );
  };

  return (
    <svg width={W} height={H} style={{ display: "block", margin: "0 auto" }}>

      {/* Cover zone fill (h - d) for simple bending */}
      {mode === "simple" && coverH > 1 && (
        <rect x={ox} y={oy + sH - coverH} width={sW} height={coverH}
          fill="rgba(200,200,200,0.18)" stroke="none"/>
      )}

      {/* Compression zone fill — full zone from top to neutral axis (x) */}
      {blockH > 1 && (
        <rect x={ox} y={oy} width={sW} height={blockH}
          fill="rgba(44,82,130,0.15)" stroke="none"/>
      )}

      {/* Section outline */}
      <rect x={ox} y={oy} width={sW} height={sH}
        fill="none" stroke="#1a1e2e" strokeWidth={1.8}/>

      {/* Light hatching */}
      {[0.2, 0.4, 0.6, 0.8].map((f, i) => (
        <line key={i} x1={ox} y1={oy + f*sH} x2={ox+10} y2={oy + f*sH}
          stroke="#ccc" strokeWidth={0.8}/>
      ))}

      {/* Dashed line at d level for simple bending (separates d from cover) */}
      {mode === "simple" && coverH > 4 && (
        <line x1={ox} y1={yTens} x2={ox+sW} y2={yTens}
          stroke="#aaa" strokeWidth={0.8} strokeDasharray="4,3"/>
      )}

      {/* Neutral axis */}
      {xNA_y !== null && xNA_y > oy+2 && xNA_y < oy+sH-2 && (
        <>
          <line x1={ox-10} y1={xNA_y} x2={ox+sW+10} y2={xNA_y}
            stroke="#c0392b" strokeWidth={1.2} strokeDasharray="6,3"/>
          <text x={ox-12} y={xNA_y-3} textAnchor="end" style={TR}>x</text>
        </>
      )}

      {/* Tension steel bars */}
      {[0.22, 0.5, 0.78].map((f, i) => (
        <circle key={i} cx={ox + f*sW} cy={yTens} r={5.5}
          fill="#1a1e2e" stroke="#f4f5f7" strokeWidth={1}/>
      ))}

      {/* Compression steel bars (composed) */}
      {mode === "composed" && yComp !== null && [0.22, 0.5, 0.78].map((f, i) => (
        <circle key={i} cx={ox + f*sW} cy={yComp} r={5.5}
          fill="#fff" stroke="#1a1e2e" strokeWidth={1.5}/>
      ))}

      {/* ── Annotations ── */}

      {/* b — bottom double-headed arrow */}
      <Arrow x1={ox} y1={oy+sH+18} x2={ox+sW} y2={oy+sH+18}/>
      <line x1={ox}    y1={oy+sH+5} x2={ox}    y2={oy+sH+22} stroke="#555" strokeWidth={1}/>
      <line x1={ox+sW} y1={oy+sH+5} x2={ox+sW} y2={oy+sH+22} stroke="#555" strokeWidth={1}/>
      <text x={ox+sW/2} y={oy+sH+34} textAnchor="middle" style={{...TB, fontStyle:"italic"}}>
        b = {(bv*100).toFixed(0)} cm
      </text>

      {/* h — right arrow (total height, always) */}
      <Arrow x1={ox+sW+18} y1={oy} x2={ox+sW+18} y2={oy+sH}/>
      <line x1={ox+sW+10} y1={oy}    x2={ox+sW+26} y2={oy}    stroke="#555" strokeWidth={1}/>
      <line x1={ox+sW+10} y1={oy+sH} x2={ox+sW+26} y2={oy+sH} stroke="#555" strokeWidth={1}/>
      <text x={ox+sW+36} y={oy+sH/2} textAnchor="middle" style={{...TB, fontStyle:"italic"}}
        transform={`rotate(-90,${ox+sW+36},${oy+sH/2})`}>
        h = {(hv*100).toFixed(0)} cm
      </text>

      {/* d — left arrow from top to tension steel centroid (blue) */}
      <Arrow x1={ox-20} y1={oy} x2={ox-20} y2={yTens} col="#2c5282"/>
      <line x1={ox-28} y1={oy}    x2={ox-12} y2={oy}    stroke="#2c5282" strokeWidth={1}/>
      <line x1={ox-28} y1={yTens} x2={ox-12} y2={yTens} stroke="#2c5282" strokeWidth={1}/>
      <text x={ox-32} y={oy+(yTens-oy)/2+4} textAnchor="middle" style={{...TB, fontStyle:"italic", fontSize:10}}
        transform={`rotate(-90,${ox-32},${oy+(yTens-oy)/2})`}>
        {mode==="composed" ? "a" : "d"} = {(dv*100).toFixed(0)} cm
      </text>

      {/* h-d cover annotation for simple bending */}
      {mode === "simple" && coverH > 12 && (
        <>
          <Arrow x1={ox-20} y1={yTens} x2={ox-20} y2={oy+sH} col="#aaa"/>
          <line x1={ox-28} y1={oy+sH} x2={ox-12} y2={oy+sH} stroke="#aaa" strokeWidth={1}/>
          <text x={ox-32} y={yTens+(coverH)/2+4} textAnchor="middle"
            style={{...TG, fontSize:9}} transform={`rotate(-90,${ox-32},${yTens+coverH/2})`}>
            h−d={(((hv-dv)*100).toFixed(1))}cm
          </text>
        </>
      )}

      {/* d' bracket (composed) — compression steel at h-a from top */}
      {mode==="composed" && yComp !== null && (
        <>
          <line x1={ox-8} y1={oy}     x2={ox-8} y2={yComp} stroke="#aaa" strokeWidth={1} strokeDasharray="3,2"/>
          <line x1={ox-13} y1={oy}    x2={ox-3} y2={oy}    stroke="#aaa" strokeWidth={1}/>
          <line x1={ox-13} y1={yComp} x2={ox-3} y2={yComp} stroke="#aaa" strokeWidth={1}/>
          <text x={ox-32} y={oy+(yComp-oy)/2+4} textAnchor="middle"
            style={{...TG, fontSize:9}} transform={`rotate(-90,${ox-32},${oy+(yComp-oy)/2})`}>
            d′={(((hv-dpv)*100).toFixed(1))}cm
          </text>
          <text x={ox+sW+8} y={yComp+4} style={{...TG, fontStyle:"italic"}}>A_s′</text>
        </>
      )}

      {/* Steel labels */}
      <text x={ox+sW+8} y={yTens+4} style={{...T, fontStyle:"italic"}}>A_s</text>

      {/* x label on right of section */}
      {xNA_y !== null && xNA_y > oy+8 && xNA_y < oy+sH-8 && (
        <text x={ox+sW+8} y={xNA_y-3} style={{...TR, fontStyle:"italic"}}>
          x={((xNA_y-oy)/sc*100).toFixed(0)}cm
        </text>
      )}

      {/* "zona comp." label inside compression zone */}
      {blockH > 22 && (
        <text x={ox+sW/2} y={oy+blockH/2+4} textAnchor="middle"
          style={{fontSize:9, fontFamily:"Arial,sans-serif", fill:"#2c5282"}}>zona comp.</text>
      )}
    </svg>
  );
}

/* ── UI helpers ─────────────────────────────────────────────────────────── */
function Field({ label, note, children }) {
  return (
    <div className="field">
      <label>{label}</label>
      {children}
      {note && <div className="field-note">{note}</div>}
    </div>
  );
}
function Num({ label, value, onChange, unit, step="0.01", note }) {
  return (
    <Field label={label} note={note}>
      <div style={{position:"relative"}}>
        <input type="number" value={value} step={step} onChange={e=>onChange(e.target.value)}
          style={{paddingRight: unit ? 52 : 10}}/>
        {unit && <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",
          fontSize:12,color:"#888",pointerEvents:"none"}}>{unit}</span>}
      </div>
    </Field>
  );
}
function Sel({ label, value, onChange, options }) {
  return (
    <Field label={label}>
      <select value={value} onChange={e=>onChange(e.target.value)}>
        {options.map((o,i)=><option key={i} value={i}>{o.l}</option>)}
      </select>
    </Field>
  );
}
function Row({ name, sub, value, unit, hl }) {
  return (
    <div className={"result-row"+(hl?" hl":"")}>
      <div>
        <div className="result-name">{name}</div>
        {sub && <div className="result-sub">{sub}</div>}
      </div>
      <div className={"result-val"+(hl?" hl":"")}>
        {value}{unit && <span className="result-unit">{unit}</span>}
      </div>
    </div>
  );
}
function Badge({ domain }) {
  const cls = !domain ? "" : domain.includes("4") || domain.includes("5") ? " warn" : " ok";
  return <span className={"badge"+cls}>{domain || "—"}</span>;
}

/* ── App ────────────────────────────────────────────────────────────────── */
function App() {
  const [mode, setMode] = useState("simple");
  const [fckI, setFckI] = useState(4);   // C30/37
  const [fykI, setFykI] = useState(1);   // A500
  const [b,  setB]  = useState("0.30");
  const [d,  setD]  = useState("0.45");
  const [h,  setH]  = useState("0.50");
  const [dp, setDp] = useState("0.45");  // a = d (altura útil, não recobrimento)
  const [MEd, setMEd] = useState("150");
  const [NEd, setNEd] = useState("0");

  const fck = CONCRETE[+fckI].fck, fyk = STEEL[+fykI].fyk;
  const fcd = +(fck/1.5).toFixed(2), fyd = +(Math.min(fyk/1.15,600)).toFixed(2);

  const result = useCallback(() => {
    if (mode === "simple") return solvePureBending(+MEd, +b, +d, fck, fyk);
    return solveBendingAxial(+MEd, +NEd, +b, +h, +dp, fck, fyk);
  }, [mode,MEd,NEd,b,d,h,dp,fck,fyk])();

  /* Derived section properties */
  const bv = +b||0, hv = +h||0, dv = +d||0, dpv = +dp||0;
  const h_eff  = hv;  // always use total height h for gross section properties
  // d_eff: for simple = d; for composed = a (input dp is a = d directly)
  const d_eff  = mode==="simple" ? dv : dpv;
  const Ac_cm2 = (bv*100 * h_eff*100).toFixed(0);
  const I_cm4  = ((bv*100) * Math.pow(h_eff*100, 3) / 12).toFixed(0);
  const W_cm3  = ((bv*100) * Math.pow(h_eff*100, 2) / 6).toFixed(0);

  const rho_pct = result && !result.error
    ? (mode==="simple"
        ? result.As_cm2 / (bv*100 * d_eff*100) * 100
        : result.As_each_cm2 / (bv*100 * d_eff*100) * 100
      ).toFixed(3)
    : null;

  const ecu3_str = result.ecu3 ? (result.ecu3*1000).toFixed(2)+"‰" : "3.50‰";

  return (
    <div className="page">
      {/* Header */}
      <div className="header">
        <div className="header-top">
          <span className="header-code">EN 1992-1-1 · EC2</span>
          <h1>Dimensionamento de Secções Rectangulares de Betão Armado</h1>
        </div>
        <div className="header-sub">
          Bloco rectangular de tensões &nbsp;·&nbsp; γ<sub>c</sub> = 1.5 &nbsp;·&nbsp; γ<sub>s</sub> = 1.15 &nbsp;·&nbsp; baseado em H. Barros &amp; J. Figueiras (FEUP, 2012)
        </div>
      </div>

      {/* Mode */}
      <div className="mode-row">
        <button className={"mode-btn"+(mode==="simple"?" active":"")} onClick={()=>setMode("simple")}>
          Flexão Simples &nbsp;(M)
        </button>
        <button className={"mode-btn"+(mode==="composed"?" active":"")} onClick={()=>setMode("composed")}>
          Flexão Composta &nbsp;(M + N)
        </button>
      </div>

      <div className="layout">
        {/* ── Left column ── */}
        <div>
          {/* Materials */}
          <div className="panel">
            <div className="panel-title">Materiais</div>
            <Sel label="Classe de betão" value={fckI} onChange={setFckI} options={CONCRETE}/>
            <Sel label="Aço" value={fykI} onChange={setFykI} options={STEEL}/>
            <div className="mat-row">
              <div className="mat-chip">
                <div className="mat-chip-lbl">f<sub>cd</sub> = f<sub>ck</sub> / γ<sub>c</sub></div>
                <div className="mat-chip-val">{fcd} <span className="mat-chip-unit">MPa</span></div>
              </div>
              <div className="mat-chip">
                <div className="mat-chip-lbl">f<sub>yd</sub> = f<sub>yk</sub> / γ<sub>s</sub></div>
                <div className="mat-chip-val">{fyd} <span className="mat-chip-unit">MPa</span></div>
              </div>
            </div>
          </div>

          {/* Geometry */}
          <div className="panel">
            <div className="panel-title">Geometria da secção</div>
            <Num label="Largura -  b" value={b} onChange={setB} unit="m" step="0.05"/>
            {mode === "simple" ? (
              <>
                <Num label="Altura total - h" value={h} onChange={setH} unit="m" step="0.05"
                  note="Altura total da secção"/>
                <Num label="Altura útil  d"
                  value={d} onChange={setD} unit="m" step="0.05"
                  note="Distância da face comprimida ao centróide da armadura de tracção"/>
              </>
            ) : (
              <>
                <Num label="Altura total - h" value={h} onChange={setH} unit="m" step="0.05"/>
                <Num label="a  —  Altura útil"
                  value={dp} onChange={setDp} unit="m" step="0.005"
                  note="Dist. da fibra mais comprimida ao c.g. da armadura de tracção  (d′ = h − a)"/>
              </>
            )}

            {/* Section properties box */}
            <div className="sec-props">
              <div className="sec-props-title">Propriedades da secção</div>
              <table>
                <tbody>
                  <tr><td>Largura  b</td><td>{(bv*100).toFixed(0)} cm</td></tr>
                  {mode==="simple" ? (
                    <>
                      <tr><td>Altura total  h</td><td>{(hv*100).toFixed(0)} cm</td></tr>
                      <tr><td>Altura útil  d</td><td>{(dv*100).toFixed(0)} cm</td></tr>
                      <tr><td>Recobrimento  h − d</td><td>{((hv-dv)*100).toFixed(1)} cm</td></tr>
                    </>
                  ) : (
                    <>
                      <tr><td>Altura total  h</td><td>{(hv*100).toFixed(0)} cm</td></tr>
                      <tr><td>Altura útil  a = d</td><td>{(dpv*100).toFixed(1)} cm</td></tr>
                      <tr><td>d′ = h − a</td><td>{((hv-dpv)*100).toFixed(1)} cm</td></tr>
                      <tr><td>d′ / h</td><td>{((hv-dpv)/hv||0).toFixed(3)}</td></tr>
                    </>
                  )}
                  <tr><td>Área bruta  A<sub>c</sub> = b · h</td><td>{Ac_cm2} cm²</td></tr>
                  <tr><td>Inércia  I = b · h³ / 12</td><td>{Number(I_cm4).toLocaleString("pt")} cm⁴</td></tr>
                  <tr><td>Módulo  W = b · h² / 6</td><td>{Number(W_cm3).toLocaleString("pt")} cm³</td></tr>
                  {rho_pct && (
                    <tr><td className="hl">Taxa geométrica  ρ</td><td className="hl">{rho_pct} %</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* Actions */}
          <div className="panel">
            <div className="panel-title">Esforços de cálculo</div>
            <Num label="Momento  M_Ed" value={MEd} onChange={setMEd} unit="kN·m" step="1"/>
            {mode === "composed" && (
              <Num label="Esforço normal  N_Ed" value={NEd} onChange={setNEd} unit="kN" step="10"
                note="Positivo = compressão"/>
            )}
          </div>
        </div>

        {/* ── Right column ── */}
        <div>
          {/* Diagram */}
          <div className="diagram-panel">
            <div className="panel-title">Diagrama da secção transversal</div>
            <SectionDiagram mode={mode} b_m={b} d_m={d} h_m={h} dp_m={dp} result={result}/>
            <div className="diagram-caption">
              Linha tracejada vermelha = eixo neutro (x) &nbsp;·&nbsp; Zona azul = zona comprimida (até x) &nbsp;·&nbsp; Círculos = armadura
              {mode==="simple" && <> &nbsp;·&nbsp; Zona cinzenta = h − d</>}
            </div>
          </div>

          {/* Results */}
          <div className="results-panel">
            <div className="panel-title">Resultados do dimensionamento</div>

            {result.error ? (
              <div className="error-box">⚠  {result.error}</div>
            ) : (<>
              <div className="section-label">Grandezas adimensionais</div>
              <Row name="μ  =  M_Ed / (b · d² · f_cd)"
                sub={mode==="simple"
                  ? `= ${(MEd*1e6).toExponential(2)} / (${(bv*1e3).toFixed(0)} × ${(d_eff*1e3).toFixed(0)}² × ${fcd})  [N·mm]`
                  : `normalizado por b·h² — h = ${(hv*100).toFixed(0)} cm`}
                value={result.mu?.toFixed(5)}/>
              {mode==="composed" &&
                <Row name="ν  =  N_Ed / (b · h · f_cd)"
                  sub="positivo = compressão"
                  value={result.nu?.toFixed(5)}/>}

              <div className="section-label">Linha neutra</div>
              <Row name={"ξ  =  x / "+(mode==="simple"?"d":"h")+" — posição relativa"}
                value={result.xi?.toFixed(4)}/>
              <Row name="x  — profundidade da linha neutra"
                value={(result.xNA_m ? (result.xNA_m*100).toFixed(1) : (result.xi*(mode==="simple"?dv:hv)*100).toFixed(1))} unit="cm"/>
              {mode==="simple" && (
                <Row name="z  — braço de alavanca  (z = d · z/d)"
                  sub={`z/d = ${result.zd?.toFixed(3)}`}
                  value={(result.z_m ? (result.z_m*100).toFixed(1) : (result.zd*(dv)*100).toFixed(1))} unit="cm"/>
              )}
              <Row name="Domínio de deformação" value={<Badge domain={result.domain}/>}/>

              {mode==="composed" && (<>
                <div className="section-label">Tensões no aço (ELU)</div>
                <Row name="σ_s  — armadura comprimida (topo)"   value={result.ss_c} unit="MPa"
                  sub={Math.abs(result.ss_c)>=fyd*0.99 ? "atingiu f_yd (cedência)" : "elástica"}/>
                <Row name="σ_s  — armadura traccionada (base)" value={result.ss_t} unit="MPa"
                  sub={Math.abs(result.ss_t)>=fyd*0.99 ? "atingiu f_yd (cedência)" : "elástica"}/>
              </>)}

              <div className="section-label">Taxa mecânica de armadura</div>
              <Row name="ω  =  A_s · f_yd / (b · d · f_cd)"
                sub="valor equivalente ao lido nas tabelas de Barros & Figueiras"
                value={result.omega?.toFixed(5)} hl/>

              <div className="section-label">Armadura necessária</div>
              {mode==="simple" ? (<>
                <Row name="A_s  =  ω · b · d · (f_cd / f_yd)"
                  value={result.As_cm2?.toFixed(2)} unit="cm²" hl/>
                {rho_pct && <Row name="Taxa geométrica  ρ  =  A_s / (b · d)"
                  value={rho_pct} unit="%"/>}
              </>) : (<>
                <Row name="A_s,tot  =  ω · b · h · (f_cd / f_yd)"
                  value={result.As_tot_cm2?.toFixed(2)} unit="cm²" hl/>
                <Row name="A_s  =  A_s′  =  A_s,tot / 2  (armadura simétrica)"
                  value={result.As_each_cm2?.toFixed(2)} unit="cm²  (cada face)"/>
                {rho_pct && <Row name="Taxa geométrica  ρ  =  A_s / (b · d)"
                  value={rho_pct} unit="%"/>}
              </>)}

              <div className="ec2-note">
                Parâmetros do bloco EC2: &nbsp; λ = {result.lambda} &nbsp;·&nbsp; η = {result.eta} &nbsp;·&nbsp; ε<sub>cu3</sub> = {ecu3_str}
                {mode==="composed" && <><br/>Armadura simétrica assumida — A<sub>s</sub> = A<sub>s</sub>′ &nbsp;·&nbsp; d′/h = {((hv-dpv)/hv||0).toFixed(3)}</>}
              </div>
            </>)}
          </div>
        </div>
      </div>

      <div className="page-footer">
        EN 1992-1-1 &nbsp;·&nbsp; γ<sub>c</sub> = 1.5 &nbsp;·&nbsp; γ<sub>s</sub> = 1.15 &nbsp;·&nbsp;
        Paulo Mendes, ULP 2025/2026
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
